<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="620" height="380" font-family="sans-serif">
  <!-- Field background -->
  <rect width="620" height="380" fill="#2d5a27" rx="8"/>

  <!-- Field border -->
  <rect x="10" y="10" width="600" height="360" fill="none" stroke="white" stroke-width="3" rx="4"/>

  <!-- Center line -->
  <line x1="310" y1="10" x2="310" y2="370" stroke="white" stroke-width="2" stroke-dasharray="10,6"/>

  <!-- Alliance walls -->
  <rect x="10" y="10" width="12" height="360" fill="#c0392b" opacity="0.8"/>
  <rect x="598" y="10" width="12" height="360" fill="#2980b9" opacity="0.8"/>

  <!-- Alliance labels -->
  <text x="30" y="200" fill="#c0392b" font-size="13" font-weight="bold" transform="rotate(-90,30,200)" text-anchor="middle">RED</text>
  <text x="595" y="200" fill="#2980b9" font-size="13" font-weight="bold" transform="rotate(90,595,200)" text-anchor="middle">BLUE</text>

  <!-- Title -->
  <text x="310" y="36" fill="white" font-size="15" font-weight="bold" text-anchor="middle">Autonomous Path Map</text>

  <!-- Path 1 — top-left -->
  <circle cx="130" cy="100" r="34" fill="#e74c3c" opacity="0.85"/>
  <text x="130" y="96" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">1</text>
  <text x="130" y="120" fill="white" font-size="10" text-anchor="middle">Top Left</text>

  <!-- Path 2 — center-left -->
  <circle cx="130" cy="220" r="34" fill="#e67e22" opacity="0.85"/>
  <text x="130" y="216" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">2</text>
  <text x="130" y="240" fill="white" font-size="10" text-anchor="middle">Mid Left</text>

  <!-- Path 3 — bottom-left -->
  <circle cx="130" cy="330" r="34" fill="#f1c40f" opacity="0.9"/>
  <text x="130" y="326" fill="#333" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">3</text>
  <text x="130" y="350" fill="white" font-size="10" text-anchor="middle">Bot Left</text>

  <!-- Path 4 — center -->
  <circle cx="310" cy="195" r="34" fill="#27ae60" opacity="0.85"/>
  <text x="310" y="191" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">4</text>
  <text x="310" y="215" fill="white" font-size="10" text-anchor="middle">Center</text>

  <!-- Path 5 — top-right -->
  <circle cx="490" cy="100" r="34" fill="#2980b9" opacity="0.85"/>
  <text x="490" y="96" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">5</text>
  <text x="490" y="120" fill="white" font-size="10" text-anchor="middle">Top Right</text>

  <!-- Path 6 — center-right -->
  <circle cx="490" cy="220" r="34" fill="#8e44ad" opacity="0.85"/>
  <text x="490" y="216" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">6</text>
  <text x="490" y="240" fill="white" font-size="10" text-anchor="middle">Mid Right</text>

  <!-- Path 7 — bottom-right -->
  <circle cx="490" cy="330" r="34" fill="#16a085" opacity="0.85"/>
  <text x="490" y="326" fill="white" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">7</text>
  <text x="490" y="350" fill="white" font-size="10" text-anchor="middle">Bot Right</text>

  <!-- Arrows suggesting movement -->
  <path d="M164 100 Q310 60 276 100" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M164 220 Q240 220 276 195" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Legend -->
  <rect x="215" y="340" width="190" height="28" fill="black" opacity="0.35" rx="4"/>
  <text x="310" y="358" fill="white" font-size="11" text-anchor="middle">Tap a number to add it to the path</text>
</svg>
